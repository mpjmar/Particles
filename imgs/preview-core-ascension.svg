      <stop offset="0%" stop-color="#042018"/>
      <stop offset="100%" stop-color="#0f3b2d"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#86efac"/>
