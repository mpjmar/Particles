<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PARTICLES – Pulse Clash</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
</head>
<body>

	<!-- ── Sidebar (Reusing UI from Simulation) ────────────────────────── -->
	<aside class="sidebar">
		<div class="logo">
			<span class="logo-icon">⚡</span>
			<h1 id="game-title">PLAYER</h1>
			<p class="logo-sub">Interactive Session</p>
		</div>

		<!-- Player Stats -->
		<section class="panel" id="scoreboard">
			<h2 class="panel-title">Game Stats</h2>
			<div class="score-row runner">
				<span class="score-dot"></span>
				<span class="score-label">Photons</span>
				<span class="score-count" id="cnt-runners">0</span>
			</div>
			<div class="score-row chaser">
				<span class="score-dot"></span>
				<span class="score-label">Electrons</span>
				<span class="score-count" id="cnt-chasers">0</span>
			</div>
			<div class="score-row turn-row">
				<span class="score-label">Ability Charges</span>
				<span class="score-count neutral" id="cnt-charges">5</span>
			</div>
		</section>

		<!-- System Settings (Consolidated) -->
		<section class="panel">
			<h2 class="panel-title">System Settings</h2>
			<div class="control-grid">
				<div class="control-row">
					<label for="inp-rows">Rows</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-rows" min="10" max="100" value="40" />
					</div>
				</div>
				<div class="control-row">
					<label for="inp-cols">Cols</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-cols" min="10" max="100" value="60" />
					</div>
				</div>
                <div class="control-row full-width">
					<label for="inp-speed">Sim. Speed</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-speed" min="1" max="20" value="2" />
						<span class="val-badge">x</span>
					</div>
				</div>
				<div class="control-row full-width">
					<label for="inp-quality">Visual FX</label>
					<div class="control-input-wrap">
						<select id="inp-quality">
							<option value="high" selected>High</option>
							<option value="low">Performance</option>
						</select>
					</div>
				</div>
				<div class="control-row full-width">
					<label for="inp-enemy-cap">Enemy Max</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-enemy-cap" min="10" max="300" value="100" />
					</div>
				</div>
				<div class="control-row full-width">
					<label for="inp-spawn-pace">Spawn Pace</label>
					<div class="control-input-wrap">
						<select id="inp-spawn-pace">
							<option value="slow">Slow</option>
							<option value="normal" selected>Normal</option>
							<option value="aggressive">Aggressive</option>
						</select>
					</div>
				</div>
			</div>
		</section>

		<!-- Particle Density -->
		<section class="panel">
			<h2 class="panel-title">Particle Density</h2>
			<div class="control-grid">
				<div class="control-row">
					<label for="inp-run">Photons</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-run" min="1" max="100" value="20" />
					</div>
				</div>
				<div class="control-row">
					<label for="inp-cha">Electrons</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-cha" min="1" max="100" value="20" />
					</div>
				</div>
				<div class="control-row">
					<label for="inp-obs">Obstacl.</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-obs" min="0" max="200" value="50" />
					</div>
				</div>
                <div class="control-row">
					<label for="inp-hea">Healers</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-hea" min="0" max="50" value="5" />
					</div>
				</div>
                <div class="control-row">
					<label for="inp-spe">Speeders</label>
					<div class="control-input-wrap">
						<input type="number" id="inp-spe" min="0" max="50" value="5" />
					</div>
				</div>
			</div>
		</section>

		<!-- Controls -->
		<div class="controls">
			<button id="btn-start" class="btn-primary">START MISSION</button>
			<button id="btn-reset">NEW MATCH</button>
			<button id="btn-pause">PAUSE</button>
            <a href="index.html" style="text-decoration:none;"><button id="btn-home" style="width:100%">EXIT TO MENU</button></a>
		</div>
	</aside>

	<!-- ── Main Board ────────────────────────────────────────────────── -->
	<main class="board-wrap">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-branding">
				<span class="logo-icon">⚛︎</span>
                <h1 id="top-title">PARTICLES</h1>
            </div>
            <div class="top-bar-info">
				<span class="logo-sub" id="top-mode">PULSE CLASH</span>
            </div>
        </header>

		<canvas id="board-canvas"></canvas>

		<!-- Match Result Overlay -->
		<div id="overlay" class="overlay hidden">
			<div class="overlay-card">
				<div class="overlay-icon" id="overlay-icon">⚡</div>
				<p class="overlay-result" id="overlay-msg">MISSION REPORT</p>
				<p id="overlay-sub" style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.8rem;">Photon: click to detonate an area • Electron: click to replicate allies • Click Energy Nodes to recharge Charges</p>
				<button id="btn-begin" class="btn-primary">BEGIN MISSION</button>
				<button id="btn-overlay-reset" style="width:100%; margin-top:10px;">PLAY AGAIN</button>
				<a href="game_selection.html" style="text-decoration:none; display:block; margin-top:15px;">
					<button style="width:100%; padding:10px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);">CHANGE SIDE</button>
				</a>
			</div>
		</div>
	</main>

	<!-- Scripts -->
	<script src="main.js"></script>
    <script src="game.js"></script>
</body>
</html>
