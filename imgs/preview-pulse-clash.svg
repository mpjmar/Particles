<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Pulse Clash mode preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#24354e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="0" y="0" width="280" height="700" fill="rgba(8,20,38,0.86)"/>
  <rect x="280" y="0" width="920" height="100" fill="rgba(8,20,38,0.78)"/>
  <rect x="315" y="120" width="850" height="540" rx="12" fill="#050d19" stroke="#334a68"/>
  <rect x="315" y="120" width="850" height="540" rx="12" fill="url(#grid)" opacity="0.72"/>

  <g fill="#22d3ee" opacity="0.95">
    <circle cx="430" cy="225" r="8"/><circle cx="560" cy="300" r="8"/><circle cx="730" cy="240" r="8"/>
    <circle cx="910" cy="310" r="8"/><circle cx="1030" cy="430" r="8"/>
  </g>
  <g fill="#fb923c" opacity="0.95">
    <circle cx="470" cy="420" r="8"/><circle cx="620" cy="490" r="8"/><circle cx="780" cy="390" r="8"/>
    <circle cx="950" cy="520" r="8"/><circle cx="860" cy="230" r="8"/>
  </g>

  <rect x="960" y="560" width="190" height="88" rx="12" fill="rgba(2,6,23,0.78)" stroke="#475569"/>
  <text x="975" y="592" fill="#e2e8f0" font-family="Orbitron, Arial, sans-serif" font-size="16">SHOCKWAVE</text>
  <text x="975" y="622" fill="#d946ef" font-family="Orbitron, Arial, sans-serif" font-size="22" font-weight="700">Charges 4/5</text>

  <text x="56" y="72" fill="#fb923c" font-family="Orbitron, Arial, sans-serif" font-size="28" letter-spacing="2">PULSE CLASH</text>
  <text x="330" y="62" fill="#f8fafc" font-family="Orbitron, Arial, sans-serif" font-size="38" letter-spacing="4">PARTICLES</text>
  <text x="640" y="90" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">PLAYER VS SYSTEM</text>
</svg>
