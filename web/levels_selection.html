<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Choose Your Side – Core Ascension</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
	<style>
		.top-bar {
			position: fixed !important;
			left: 0 !important;
			right: 0 !important;
			width: 100% !important;
			height: auto;
			padding: 8px 12px;
			background: rgba(2, 6, 23, 0.8);
			backdrop-filter: blur(10px);
		}

		.top-bar-branding {
			flex-direction: column;
			gap: 2px;
		}

		.top-bar h1 {
			margin: 0;
			font-size: 1.15rem;
			letter-spacing: 0.22em;
		}

		.selection-container {
			width: min(100%, 980px);
			margin: 0 auto;
			padding-top: 72px;
		}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			overflow: hidden;
			background: radial-gradient(circle at center, #082f49 0%, #020617 100%);
		}

		.selection-container {
			text-align: center;
			z-index: 10;
		}

		.selection-title {
			margin-bottom: 3rem;
		}

		.selection-title h1 {
			font-family: 'Orbitron', sans-serif;
			font-size: 2.4rem;
			color: #fff;
			letter-spacing: 0.16em;
			text-transform: uppercase;
		}

		.selection-title p {
			color: #7dd3fc;
			font-family: 'Orbitron', sans-serif;
			font-size: 0.78rem;
			letter-spacing: 0.18em;
		}

		.particle-options {
			display: flex;
			gap: 36px;
			justify-content: center;
		}

		.particle-card {
			width: 320px;
			padding: 36px 20px;
			background: rgba(15, 23, 42, 0.68);
			border: 2px solid rgba(255, 255, 255, 0.12);
			border-radius: 24px;
			cursor: pointer;
			transition: all 0.35s ease;
			text-decoration: none;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.particle-card.photon:hover {
			border-color: #22d3ee;
			background: rgba(34, 211, 238, 0.08);
			box-shadow: 0 0 58px rgba(34, 211, 238, 0.28);
			transform: translateY(-12px);
		}

		.particle-card.electron:hover {
			border-color: #fb923c;
			background: rgba(251, 146, 60, 0.08);
			box-shadow: 0 0 58px rgba(251, 146, 60, 0.24);
			transform: translateY(-12px);
		}

		.particle-preview {
			width: 102px;
			height: 102px;
			border-radius: 50%;
			margin-bottom: 22px;
		}

		.photon .particle-preview {
			background: radial-gradient(circle, #fff 0%, #22d3ee 60%, transparent 100%);
			box-shadow: 0 0 30px #22d3ee;
		}

		.electron .particle-preview {
			background: radial-gradient(circle, #fff 0%, #fb923c 60%, transparent 100%);
			box-shadow: 0 0 30px #fb923c;
		}

		.particle-card h2 {
			font-family: 'Orbitron', sans-serif;
			font-size: 1.8rem;
			color: #fff;
			margin: 8px 0;
		}

		.particle-card p {
			color: #94a3b8;
			font-size: 0.95rem;
			margin-bottom: 16px;
		}

		.ability-badge {
			padding: 8px 14px;
			border-radius: 100px;
			font-size: 0.72rem;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.09em;
			background: rgba(255,255,255,0.05);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.15);
		}

		.back-btn {
			margin-top: 2.6rem;
			display: inline-block;
			color: #64748b;
			text-decoration: none;
			font-family: 'Orbitron';
			font-size: 0.82rem;
			transition: color 0.25s;
		}
		.back-btn:hover { color: #fff; }

		@media (max-width: 980px) {
			body {
				flex-direction: column;
				height: auto;
				min-height: 100vh;
				overflow-y: auto;
				padding: 96px 12px 24px;
			}

			.selection-container {
				width: 100%;
				max-width: 760px;
				padding-top: 22px;
			}

			.selection-title {
				margin-bottom: 1.3rem;
			}

			.selection-title h1 {
				font-size: clamp(1.2rem, 7vw, 1.9rem);
				letter-spacing: 0.1em;
			}

			.selection-title p {
				font-size: 0.65rem;
				letter-spacing: 0.12em;
			}

			.particle-options {
				flex-direction: column;
				gap: 12px;
				align-items: center;
			}

			.particle-card {
				width: min(100%, 420px);
				padding: 22px 16px;
			}
		}
	</style>
</head>
<body>
	<!-- Top Bar -->
	<header class="top-bar" style="left:0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px);">
		<div class="top-bar-branding">
			<span class="logo-icon">⚛︎</span>
			<h1>PARTICLES</h1>
		</div>
		<div class="top-bar-info">
			<span class="logo-sub">SELECTION PROTOCOL</span>
		</div>
	</header>

	<div class="selection-container">
		<div class="selection-title">
			<h1>Core Ascension</h1>
			<p>SELECT YOUR PILOT CORE</p>
		</div>

		<div class="particle-options">
			<a href="levels.html?role=photon" class="particle-card photon">
				<div class="particle-preview"></div>
				<h2>PHOTON</h2>
				<p>High control, area denial and survival scaling.</p>
				<span class="ability-badge">Core Ascension</span>
			</a>

			<a href="levels.html?role=electron" class="particle-card electron">
				<div class="particle-preview"></div>
				<h2>ELECTRON</h2>
				<p>Swarm pressure with tactical clone bursts.</p>
				<span class="ability-badge">Core Ascension</span>
			</a>
		</div>

		<a href="index.html" class="back-btn">← BACK TO MODES</a>
	</div>
</body>
</html>
