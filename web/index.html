<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PARTICLES – Choose Your Mode</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
	<style>
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			overflow: hidden;
			background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
		}

		.landing-container {
			text-align: center;
			z-index: 10;
		}

		.landing-logo {
			margin-bottom: 4rem;
			animation: logoFloat 4s ease-in-out infinite;
		}

		@keyframes logoFloat {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-15px); }
		}

		.landing-logo h1 {
			font-size: 5rem;
			margin: 0;
			background: linear-gradient(to bottom, #fff 20%, #38bdf8 100%);
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
			text-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
		}

		.mode-options {
			display: flex;
			gap: 30px;
			justify-content: center;
		}

		.mode-card {
			width: 280px;
			padding: 40px 20px;
			background: rgba(30, 41, 59, 0.4);
			border: 2px solid rgba(56, 189, 248, 0.2);
			border-radius: 20px;
			backdrop-filter: blur(10px);
			cursor: pointer;
			transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			text-decoration: none;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.mode-card:hover {
			transform: scale(1.05) translateY(-10px);
			border-color: #38bdf8;
			background: rgba(30, 41, 59, 0.7);
			box-shadow: 0 0 50px rgba(56, 189, 248, 0.3);
		}

		.mode-card h2 {
			font-family: 'Orbitron', sans-serif;
			color: #fff;
			font-size: 1.5rem;
			margin: 20px 0 10px;
		}

		.mode-card p {
			color: #94a3b8;
			font-size: 0.9rem;
			line-height: 1.5;
		}

		.mode-icon {
			font-size: 3rem;
			height: 80px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* Decorative backgrounds */
		.bg-particle {
			position: absolute;
			border-radius: 50%;
			filter: blur(1px);
			opacity: 0.6;
			pointer-events: none;
		}
	</style>
</head>
<body>
	<div class="landing-container">
		<div class="landing-logo">
			<h1>PARTICLES</h1>
			<p style="letter-spacing: 0.5em; color: #38bdf8; font-family: 'Orbitron'; font-size: 0.8rem; margin-top: 10px;">QUANTUM DYNAMICS</p>
		</div>

		<div class="mode-options">
			<a href="simulation.html" class="mode-card">
				<div class="mode-icon" style="color: #38bdf8; text-shadow: 0 0 20px #38bdf8;">⚛</div>
				<h2>SIMULATION</h2>
				<p>Observe emergent behaviors and complex evolution in autonomous mode.</p>
			</a>
			
			<a href="game_selection.html" class="mode-card">
				<div class="mode-icon" style="color: #fb923c; text-shadow: 0 0 20px #fb923c;">🎮</div>
				<h2>PLAYABLE</h2>
				<p>Take control. Choose your side and dominate the grid using special abilities.</p>
			</a>
		</div>
	</div>

	<script>
		// Simple background particle effect
		for (let i = 0; i < 40; i++) {
			const p = document.createElement('div');
			p.className = 'bg-particle';
			const size = Math.random() * 4 + 2;
			const isBlue = Math.random() > 0.5;
			p.style.width = size + 'px';
			p.style.height = size + 'px';
			p.style.background = isBlue ? '#38bdf8' : '#fb923c';
			p.style.boxShadow = `0 0 10px ${isBlue ? '#38bdf8' : '#fb923c'}`;
			p.style.left = Math.random() * 100 + 'vw';
			p.style.top = Math.random() * 100 + 'vh';
			document.body.appendChild(p);
			
			// Simple drift
			const vx = (Math.random() - 0.5) * 0.5;
			const vy = (Math.random() - 0.5) * 0.5;
			let x = parseFloat(p.style.left);
			let y = parseFloat(p.style.top);
			
			function move() {
				x += vx;
				y += vy;
				if (x < 0) x = 100; if (x > 100) x = 0;
				if (y < 0) y = 100; if (y > 100) y = 0;
				p.style.left = x + 'vw';
				p.style.top = y + 'vh';
				requestAnimationFrame(move);
			}
			move();
		}
	</script>
</body>
</html>
