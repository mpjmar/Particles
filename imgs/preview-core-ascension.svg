  </g>
  <text x="60" y="90" fill="#ecfeff" font-family="Orbitron, Arial, sans-serif" font-size="46" letter-spacing="3">CORE ASCENSION</text>
  <text x="62" y="128" fill="#99f6e4" font-family="Inter, Arial, sans-serif" font-size="24">Progressive campaign and survival objectives</text>
