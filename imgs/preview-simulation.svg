  </g>

  <text x="66" y="72" fill="#22d3ee" font-family="Orbitron, Arial, sans-serif" font-size="28" letter-spacing="2">SIMULATION HUD</text>
  <text x="330" y="62" fill="#f8fafc" font-family="Orbitron, Arial, sans-serif" font-size="38" letter-spacing="4">PARTICLES</text>
  <text x="635" y="90" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">SIMULATION</text>
